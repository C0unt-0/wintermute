# Wintermute Data Pipeline Configuration
# ========================================

max_seq_length: 2048
pad_token: "<PAD>"
unk_token: "<UNK>"

paths:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  ms_malware_dir: "data/ms-malware"
  bazaar_dir: "data/bazaar"
  synthetic_dir: "data/synthetic"

tokenizer:
  vocab_file: "vocab.json"
  families_file: "families.json"

synthetic:
  n_samples: 500
  seed: 42
