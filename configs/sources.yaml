# Wintermute ETL Pipeline Configuration
# ======================================
# Run: wintermute data etl
# Docs: etl.md

pipeline:
  out_dir: "data/processed"
  max_seq_length: 2048
  shuffle: true
  seed: 42
  pad_token: "<PAD>"
  unk_token: "<UNK>"
  cls_token: "<CLS>"
  sep_token: "<SEP>"
  mask_token: "<MASK>"

sources:
  synthetic:
    enabled: true
    n_samples: 500
    max_seq_length: 2048
    seed: 42

  pe_files:
    enabled: false
    data_dir: "data/raw"
    min_opcodes: 10

  ms_dataset:
    enabled: false
    data_dir: "data/ms-malware"
    labels_file: "labels.csv"
    max_samples: null

  malware_bazaar:
    enabled: false
    api_key: ""
    cache_dir: "data/bazaar"
    delay: 1.0
    min_opcodes: 10
    families:
      - name: AgentTesla
        signature: AgentTesla
        limit: 100
      - name: Emotet
        signature: Emotet
        limit: 100
      - name: TrickBot
        signature: TrickBot
        limit: 100
      - name: Formbook
        signature: Formbook
        limit: 100
      - name: Lokibot
        signature: Lokibot
        limit: 100

  asm_directory:
    enabled: false
    data_dir: "data/bazaar"
    format: "auto"
    min_opcodes: 10
    max_samples_per_family: null

  # ─── New sources ─────────────────────────────────────────────────

  malshare:
    enabled: false
    api_key: ""                    # or MALSHARE_API_KEY env var
    cache_dir: "data/malshare"
    delay: 1.0
    min_opcodes: 10
    max_samples: 500
    file_type: "PE32"

  urlhaus:
    enabled: false
    cache_dir: "data/urlhaus"
    delay: 1.0
    min_opcodes: 10
    max_samples: 500
    recent_limit: 1000
    file_types:
      - "exe"
      - "dll"

  virustotal:
    enabled: false
    api_key: ""                    # or VT_API_KEY env var
    cache_dir: "data/virustotal"
    mode: "enrich"                 # "enrich" (free tier) or "download" (premium)
    delay: 15.0                    # 4 req/min = 15s between requests
    min_opcodes: 10
    max_samples: 500
    hash_file: ""                  # optional: path to file with one SHA256 per line
    cache_dirs:
      - "data/bazaar"
      - "data/malshare"
      - "data/urlhaus"
    min_detection_ratio: 0.5

  threatfox:
    enabled: false
    cache_dirs:
      - "data/bazaar"
      - "data/urlhaus"
      - "data/malshare"
    delay: 1.0
    min_opcodes: 10
    max_samples: 500
    days: 7
    download_missing: true
    malware_families: []           # empty = all families

  ember_dataset:
    enabled: false
    data_dir: "data/ember"
    cache_dirs:
      - "data/bazaar"
      - "data/malshare"
      - "data/urlhaus"
    min_opcodes: 10
    max_samples: null
    include_benign: true

  virusshare:
    enabled: false
    hash_dir: "data/virusshare"
    cache_dirs:
      - "data/bazaar"
      - "data/malshare"
      - "data/urlhaus"
    api_key: ""                    # optional, env VIRUSSHARE_API_KEY
    delay: 2.0
    min_opcodes: 10
    max_samples: 500
