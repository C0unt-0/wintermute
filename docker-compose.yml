version: '3.8'

services:

  # ── Message Broker ──────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Web Server ──────────────────────────────────────────────────────
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./tmp_uploads:/tmp/wintermute_uploads
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Celery GPU Worker ───────────────────────────────────────────────────────
  worker:
    build: .
    command: celery -A src.wintermute.engine.worker.celery_app worker --loglevel=info -c 4
    volumes:
      - ./tmp_uploads:/tmp/wintermute_uploads
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    # Uncomment to enable GPU passthrough for PyTorch inference:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

    # ── Flower (Celery Dashboard) ───────────────────────────────────────────────
  flower:
    build: .
    command: celery -A src.wintermute.engine.worker.celery_app flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - worker
    restart: unless-stopped
