services:
  api:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WINTERMUTE_DATABASE_URL=postgresql+psycopg://wintermute:${DB_PASSWORD:-wintermute_dev}@db:5432/wintermute
  worker:
    build: .
    command: celery -A src.wintermute.engine.worker worker -l info
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - WINTERMUTE_DATABASE_URL=postgresql+psycopg://wintermute:${DB_PASSWORD:-wintermute_dev}@db:5432/wintermute
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
  db:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: wintermute
      POSTGRES_USER: wintermute
      POSTGRES_PASSWORD: ${DB_PASSWORD:-wintermute_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wintermute"]
      interval: 5s
      retries: 5

volumes:
  pgdata:
